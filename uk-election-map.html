        function initMap() {
            map = L.map('map').setView([55, -3.5], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                maxZoom: 18,
                subdomains: 'abcd'
            }).addTo(map);
            
            addLegend();
            displayMarkers();
            
            document.getElementById('status').textContent = `Showing ${constituencies.length} constituencies`;
        }

        function displayMarkers() {
            // Remove old markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Add new markers
            constituencies.forEach(c => {
                const color = currentView === 'results' ? COLORS[c.result] : COLORS[c.poll];
                const marker = L.circleMarker([c.lat, c.lng], {
                    radius: 5,
                    fillColor: color,
                    color: '#333',
                    weight: 1,
                    opacity: 0.8,
                    fillOpacity: 0.8
                });

                let html = `<strong>${c.name}</strong><br>`;
                if (currentView === 'results') {
                    html += `2024: ${c.result}`;
                } else {
                    html += `2025: ${c.poll}`;
                }

                marker.bindPopup(html);
                marker.addTo(map);
                markers.push(marker);
            });
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('resultsBtn').classList.toggle('active', view === 'results');
            document.getElementById('pollingBtn').classList.toggle('active', view === 'polling');
            displayMarkers();
        }

        function addLegend() {
            const div = L.DomUtil.create('div', 'legend');
            let html = '<strong>Parties</strong><br>';
            Object.keys(COLORS).forEach(party => {
                html += `<div class="legend-item"><div class="legend-color" style="background: ${COLORS[party]};"></div>${party}</div>`;
            });
            div.innerHTML = html;
            L.DomUtil.addClass(div, 'legend');
            map._controlContainer.appendChild(div);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            document.getElementById('resultsBtn').addEventListener('click', () => switchView('results'));
            document.getElementById('pollingBtn').addEventListener('click', () => switchView('polling'));
        });
    </script>
